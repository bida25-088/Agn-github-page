
<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Elite Travel Booking</title>

            <a href="index.html">Home</a>

            <a href="about.html">About</a>

            <a href="booking.html">Booking</a>

            <a href="contact.html">Contact</a>

   <style> body 
   
   { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; } .
   
   booking-container { width: 80%; max-width: 500px; margin: 50px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); } 
   
   h2 { text-align: center; color: #2c3e50; }
   
   label { display: block;margin: 10px 0 5px; font-weight: bold; }
   
   input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
   
   button { background: #27ae60; color: #fff; padding: 12px; border: none; border-radius: 4px; cursor: pointer; width: 100%;font-size: 16px;margin-top: 20px; /* ensures spacing before button */ }
   
   button:hover { background: #219150; }
   
   </style>
   
   <link rel="stylesheet" href="styles.css">
   

</head> 
   
<body> 
    
    <div class="booking-container"> 
        
        <h2>Travel Booking Form</h2> 
        
        <form action="confirmation.html" method="get"> 
            
            <!-- Name --> 
             
            <label for="name">Full Name</label>
            
            <input type="text" id="name" name="name" required>
            
            <!-- Gender --> 
             
            <label for="gender">Gender</label> 
            
            <select id="gender" name="gender" required>
                
                <option value="">-- Select Gender --</option> 
                
                <option value="male">Male</option>
                
                <option value="female">Female</option> 
            
            </select>

            <!-- Contact -->
             
            <label for="contact">Contact Number</label> 
            
            <input type="tel" id="contact" name="contact" placeholder="+267-XXX-XXX-XXX" required>
            
            <!-- Preferred Location --> 
             
            <label for="location">Preferred Location</label> 
            
            <input type="text" id="location" name="location" required>
            
            <!-- Preferred Dates --> 
             
            <label for="date">Preferred Travel Date</label> 
            
            <input type="date" id="date" name="date" required> 
            
            <!-- Travel Status -->
             
            <label for="status">Travel Status</label>
            
            <select id="status" name="status" required> 
                
                <option value="">-- Select Status --</option>
                
                <option value="planned">Planned</option>
                
                <option value="ongoing">Ongoing</option>
                
                <option value="completed">Completed</option>
            
            </select>

            <!-- Number of Travelers -->
             
            <label for="travelers">Number of Travelers</label> 
            
            <select id="travelers" name="travelers" required>
                
                <option value="">-- Select Option --</option> 
                
                <option value="single">Single Traveler</option> 
                
                <option value="multiple">More than 1 Traveler</option> 
            
            </select>
            
            <!-- Payment Method -->
             
            <label for="payment">Payment Method</label> 
            
            <select id="payment" name="payment" required>
                
                <option value="cash">Cash</option> 
            
            </select> 
            
            <!-- Submit Button (only at the end) --> 
             
            <button type="submit">Submit Booking</button> 

            <input type="submit"  value="Submit">
        
        </form> 
    
    </div> 

</body> 

</html>
